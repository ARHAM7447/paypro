<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - PriceTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="logo">PriceTrack</div>
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
    </div>

    <script>
    function toggleSidebar() {
        document.body.classList.toggle("sidebar-open");
    }
    </script>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <span>🚀</span> PriceTrack
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}"><span>📊</span> Dashboard</a>
            <a href="{{ url_for('my_products') }}" class="active"><span>📦</span> My Products</a>
            <a href="{{ url_for('wishlist') }}"><span>🛍️</span> Wishlist</a>
            <a href="{{ url_for('analytics') }}"><span>📈</span> Analytics</a>
            <a href="{{ url_for('alerts') }}"><span>🔔</span> Alerts</a>
            <a href="{{ url_for('discover') }}"><span>🔍</span> Discover Deals</a>
        </nav>

        <div class="sidebar-footer">
            <a href="{{ url_for('home') }}" class="btn-logout">← Back to Homepage</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <a href="{{ url_for('home') }}" class="back-btn">← Back to Homepage</a>

            <div class="search-container">
                <input type="text" placeholder="Search tracked products...">
            </div>

            <div class="top-right">
                <div class="notification">
                    <span>🔔</span>
                    <span class="badge">0</span>
                </div>
                <div class="user-profile">
                    <img src="https://picsum.photos/id/64/40/40" alt="User">
                    <span>Arham</span>
                </div>
            </div>
        </header>

        <!-- My Products Content -->
        <div class="dashboard-container">
            <h1>📦 My Tracked Products</h1>
            <p class="subtitle">Here are all the products you're tracking</p>

            <!-- Products List -->
            <div id="productsList" class="products-grid">
                <p>Loading products...</p>
            </div>
        </div>

    </div>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
