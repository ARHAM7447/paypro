<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - PriceTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        .product-card {
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 245, 255, 0.15);
        }
        .price {
            font-size: 1.9rem;
            font-weight: 700;
            color: #00f5ff;
        }
        .toast {
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="logo">PriceTrack</div>
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <span>🚀</span> PriceTrack
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}"><span>📊</span> Dashboard</a>
            <a href="{{ url_for('my_products') }}" class="active"><span>📦</span> My Products</a>
            <a href="{{ url_for('wishlist') }}"><span>🛍️</span> Wishlist</a>
            <a href="{{ url_for('analytics') }}"><span>📈</span> Analytics</a>
            <a href="{{ url_for('alerts') }}"><span>🔔</span> Alerts</a>
            <a href="{{ url_for('discover') }}"><span>🔍</span> Discover Deals</a>
        </nav>

        <div class="sidebar-footer">
            <a href="{{ url_for('home') }}" class="btn-logout">← Back to Homepage</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <a href="{{ url_for('home') }}" class="back-btn">← Back to Homepage</a>

            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search tracked products..." onkeyup="filterProducts()">
            </div>

            <div class="top-right">
                <div class="notification">
                    <span>🔔</span>
                    <span class="badge" id="alert-count">0</span>
                </div>
                <div class="user-profile">
                    <img src="https://picsum.photos/id/64/40/40" alt="User">
                    <span>Arham</span>
                </div>
            </div>
        </header>

        <!-- My Products Content -->
        <div class="dashboard-container">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1>📦 My Tracked Products</h1>
                    <p class="subtitle">Prices update automatically every hour • Total: <span id="product-count">0</span></p>
                </div>
                <a href="/" class="btn btn-primary">+ Track New Product</a>
            </div>

            <!-- Products Grid -->
            <div id="productsList" class="products-grid">
                <!-- JavaScript se cards yahan aayenge -->
            </div>
        </div>
    </div>

    <!-- Price History Modal -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-product-name"></h2>
                <button onclick="closeModal()" class="close-btn">✕</button>
            </div>
            <canvas id="price-chart" height="300"></canvas>
        </div>
    </div>

    <script>
        let allProducts = [];
        let chartInstance = null;

        // Toggle Sidebar
        function toggleSidebar() {
            document.body.classList.toggle("sidebar-open");
        }

        // Load all products
        async function loadProducts() {
            const container = document.getElementById('productsList');
            container.innerHTML = '<p class="loading">Loading your tracked products...</p>';

            try {
                const res = await fetch('/api/my-products');
                allProducts = await res.json();

                document.getElementById('product-count').textContent = allProducts.length;
                
                if (allProducts.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p class="text-6xl mb-4">📦</p>
                            <h3>No products tracked yet</h3>
                            <p class="text-gray-400">Start tracking your first product from homepage</p>
                            <a href="/" class="btn btn-primary mt-6 inline-block">Track New Product →</a>
                        </div>`;
                    return;
                }

                renderProducts(allProducts);

            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-red-400">Failed to load products. Please try again.</p>`;
            }
        }

        // Render product cards
        function renderProducts(products) {
            const container = document.getElementById('productsList');
            container.innerHTML = '';

            products.forEach(product => {
                const lastPrice = product.current_price;
                const card = document.createElement('div');
                card.className = `product-card bg-gray-900 rounded-3xl p-6 border border-gray-800`;
                
                card.innerHTML = `
                    <h3 class="font-semibold text-lg line-clamp-2 mb-4">${product.name}</h3>
                    
                    <div class="mb-6">
                        <p class="text-sm text-gray-400">Current Price</p>
                        <p class="price">₹${lastPrice}</p>
                    </div>

                    <p class="text-xs text-gray-500 mb-6">
                        Last updated: ${new Date(product.last_updated).toLocaleString()}
                    </p>

                    <div class="flex gap-3">
                        <button onclick="viewHistory('${product.url}', '${product.name.replace(/'/g, "\\'")}', ${JSON.stringify(product.price_history)})" 
                                class="flex-1 bg-cyan-600 hover:bg-cyan-700 py-3 rounded-2xl text-sm font-medium transition">
                            📈 Price History
                        </button>
                        <button onclick="deleteProduct('${product.url}')" 
                                class="flex-1 bg-red-900/40 hover:bg-red-900/70 text-red-400 py-3 rounded-2xl text-sm font-medium transition">
                            Delete
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Filter products (search)
        function filterProducts() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(searchTerm)
            );
            renderProducts(filtered);
        }

        // View Price History in Modal
        function viewHistory(url, name, history) {
            document.getElementById('modal-product-name').textContent = name;
            document.getElementById('history-modal').classList.remove('hidden');

            const ctx = document.getElementById('price-chart');
            if (chartInstance) chartInstance.destroy();

            const labels = history.map(h => new Date(h.time).toLocaleDateString('en-IN'));
            const prices = history.map(h => h.price);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Price ₹',
                        data: prices,
                        borderColor: '#00f5ff',
                        backgroundColor: 'rgba(0, 245, 255, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#333' } },
                        x: { grid: { color: '#333' } }
                    }
                }
            });
        }

        function closeModal() {
            document.getElementById('history-modal').classList.add('hidden');
            if (chartInstance) chartInstance.destroy();
        }

        // Delete Product (placeholder)
        function deleteProduct(url) {
            if (confirm("Are you sure you want to delete this product?")) {
                // TODO: Add DELETE API later
                showToast("Product deleted (Demo)", "success");
                loadProducts(); // refresh
            }
        }

        // Beautiful Toast Notification
        function showToast(msg, type = "success") {
            const toast = document.createElement('div');
            toast.className = `toast fixed bottom-6 right-6 px-6 py-4 rounded-2xl text-white font-medium shadow-2xl z-50 flex items-center gap-3 ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
            toast.innerHTML = `${type === 'success' ? '✅' : '❌'} ${msg}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Load products when page is ready
        window.onload = loadProducts;
    </script>

</body>
</html>
