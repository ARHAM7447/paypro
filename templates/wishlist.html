<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - PriceTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

    <div class="sidebar">
        <div class="logo"><span>🚀</span> PriceTrack</div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}"><span>📊</span> Dashboard</a>
            <a href="{{ url_for('my_products') }}"><span>📦</span> My Products</a>
            <a href="{{ url_for('wishlist') }}" class="active"><span>🛍️</span> Wishlist</a>
            <a href="{{ url_for('analytics') }}"><span>📈</span> Analytics</a>
            <a href="{{ url_for('alerts') }}"><span>🔔</span> Alerts</a>
            <a href="{{ url_for('discover') }}"><span>🔍</span> Discover Deals</a>
        </nav>

        <div class="sidebar-footer">
            <a href="{{ url_for('home') }}" class="btn-logout">← Back to Home</a>
        </div>
    </div>

    <div class="main-content">

        <header class="top-bar">
            <a href="{{ url_for('dashboard') }}" class="back-btn">← Dashboard</a>

            <div class="search-container">
                <input type="text" placeholder="Search wishlist...">
            </div>

            <div class="top-right">
                <div class="notification">
                    <span>🔔</span>
                    <span class="badge">3</span>
                </div>

                <div class="user-profile">
                    <img src="https://picsum.photos/id/64/40/40" alt="User">
                    <span>Arham</span>
                </div>
            </div>
        </header>

        <div class="dashboard-container">
            <h1>My Wishlist</h1>
            <p class="subtitle">Products you want to buy when price drops</p>

            <div class="card full-width">
                <p style="padding:60px;text-align:center;color:#888;">
                    Wishlist items will be shown here...
                </p>
            </div>
        </div>

    </div>

</body>
</html>
