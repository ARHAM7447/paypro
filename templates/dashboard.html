<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PriceTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

    <div class="mobile-header">
        <div class="logo">PriceTrack</div>
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
    </div>

    <script>
    function toggleSidebar() {
        document.body.classList.toggle("sidebar-open");
    }
    </script>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <span>🚀</span> PriceTrack
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="active"><span>📊</span> Dashboard</a>
            <a href="{{ url_for('my_products') }}"><span>📦</span> My Products</a>
            <a href="{{ url_for('wishlist') }}"><span>🛍️</span> Wishlist</a>
            <a href="{{ url_for('analytics') }}"><span>📈</span> Analytics</a>
            <a href="{{ url_for('alerts') }}"><span>🔔</span> Alerts</a>
            <a href="{{ url_for('discover') }}"><span>🔍</span> Discover Deals</a>
        </nav>

        <div class="sidebar-footer">
            <a href="{{ url_for('home') }}" class="btn-logout">← Back to Homepage</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <a href="{{ url_for('home') }}" class="back-btn">← Back to Homepage</a>

            <div class="search-container">
                <input type="text" placeholder="Search products or URLs...">
            </div>

            <div class="top-right">
                <div class="notification">
                    <span>🔔</span>
                    <span class="badge">3</span>
                </div>
                <div class="user-profile">
                    <img src="https://picsum.photos/id/64/40/40" alt="User">
                    <span>Arham</span>
                </div>
            </div>
        </header>

        <!-- Dashboard Content (same as above) -->
        <div class="dashboard-container">
            <h1>Welcome back, Arham 👋</h1>
            <p class="subtitle">Here's what's happening with your tracked products today</p>

            <div class="stats-grid">
                <!-- ... same stats cards as your original ... -->
            </div>

            <div class="main-grid">
                <!-- ... same product list, chart, alerts ... -->
            </div>
        </div>
    </div>

</body>
</html>
