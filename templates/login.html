<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PriceTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="auth-container">
    
    <!-- Left Section -->
    <div class="auth-left">
        <div class="logo">
            <span>🚀</span> PriceTrack
        </div>
        <h1>Track Prices.<br>Save Money.<br>Shop Smart.</h1>
        <p class="tagline">Join thousands of smart shoppers saving every day.</p>
    </div>

    <!-- Right Section -->
    <div class="auth-right">

        <!-- Back Button -->
        <a href="{{ url_for('home') }}" class="back-btn">← Back to Homepage</a>

        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to continue to your dashboard</p>

            <!-- FORM -->
            <form action="{{ url_for('login') }}" method="POST">

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="you@example.com" 
                        required 
                        autofocus>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Google button -->
            <button class="btn-google" disabled>
                Continue with Google (Coming Soon)
            </button>

            <p class="switch-text">
                Don't have an account? 
                <a href="{{ url_for('signup') }}">Sign Up</a>
            </p>

        </div>
    </div>
</div>

</body>
</html>
