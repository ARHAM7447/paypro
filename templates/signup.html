<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PriceTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

    <div class="auth-container">
        
        <!-- Left Branding -->
        <div class="auth-left">
            <div class="logo">
                <span>🚀</span> PriceTrack
            </div>
            <h1>Start Tracking Prices.<br>Start Saving Money.</h1>
            <p class="tagline">Create your free account in 30 seconds</p>
        </div>

        <!-- Right Side -->
        <div class="auth-right">

            <!-- Back Button -->
            <a href="{{ url_for('home') }}" class="back-btn">
                ← Back to Homepage
            </a>

            <div class="auth-card">
                <h2>Create Account</h2>
                <p class="subtitle">Join the smartest way to shop</p>

                <form>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Arham Khan" required>
                    </div>

                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="you@example.com" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create a strong password" required>
                    </div>

                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="Confirm your password" required>
                    </div>

                    <button type="submit" class="btn-primary">Create Account</button>
                </form>

                <div class="divider"><span>OR</span></div>

                <button class="btn-google">
                    <span>Continue with Google</span>
                </button>

                <p class="switch-text">
                    Already have an account?
                    <a href="{{ url_for('login') }}">Login</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
